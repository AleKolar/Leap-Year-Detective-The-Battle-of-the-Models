<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leap Year Detective 🕵️</title>
    <link rel="icon" href="static/favicon.ico">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background: #f0f4f8;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin: 20px 0;
        }

        h1 {
            color: #2d3748;
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        h2 {
            color: #2d3748;
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        input, select {
            padding: 12px;
            font-size: 1em;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
        }

        button {
            padding: 12px 24px;
            font-size: 1em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.1em;
        }

        .leap {
            background: #c6f6d5;
            border-left: 4px solid #38a169;
        }

        .common {
            background: #fed7d7;
            border-left: 4px solid #e53e3e;
        }

        .fact {
            font-style: italic;
            color: #4a5568;
            margin-top: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: #ebf4ff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #2b6cb0;
        }

        /* Горизонтальный контейнер для двух колонок */
        .horizontal-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .left-column, .right-column {
            flex: 1 1 48%;
            min-width: 350px;
        }

        .arena-columns {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .arena-code {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            min-height: 200px;
            font-size: 0.9em;
        }

        .winner-msg {
            font-weight: bold;
            font-size: 1.3em;
            margin: 15px 0;
        }
    </style>
</head>
<body>

<!-- Заголовок на всю ширину -->
<div class="card">
    <h1>🕵️ Leap Year Detective – Битва моделей</h1>
</div>

<!-- Горизонтальный блок: слева детектив+статистика, справа арена -->
<div class="horizontal-container">
    <!-- Левая колонка -->
    <div class="left-column">
        <div class="card">
            <h2>🔎 Проверка года</h2>
            <p>С учётом исключений (1900, 2000, 2100...)</p>
            <input type="number" id="yearInput" placeholder="2024" value="2024">
            <button onclick="checkYear()">Расследовать</button>
            <button onclick="quickCheck(1900)">1900</button>
            <button onclick="quickCheck(2000)">2000</button>
            <button onclick="quickCheck(2100)">2100</button>
            <div id="result"></div>
        </div>
        <div class="card">
            <h2>📊 Статистика</h2>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value" id="totalChecks">0</div>
                    всего
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="leapCount">0</div>
                    високосных
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="commonCount">0</div>
                    обычных
                </div>
            </div>
            <button onclick="loadStats()" style="margin-top:10px;">Обновить</button>
        </div>
    </div>

    <!-- Правая колонка -->
    <div class="right-column">
        <div class="card">
            <h2>🤖 LLM Arena: Битва моделей</h2>
            <p>Модели не получают подсказки про 400. Кто сам вспомнит правило — победит!</p>
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <select id="model1">
                    <option value="gpt-4o-mini">🟢 GPT-4o-mini</option>
                    <option value="deepseek-chat" selected>🟢 DeepSeek-Chat</option>
                    <option value="llama-3.1-8b">🟢 Llama 3.1 8B</option>
                    <option value="qwen3-coder-480b">🟢 Qwen3 Coder 480B</option>
                    <option value="llama-3.3-70b">🟢 Llama 3.3 70B</option>
                    <option value="llama-3.2-3b">🟡 Llama 3.2 3B</option>
                </select>
                <span style="font-size:2em;">⚔️</span>
                <select id="model2">
                    <option value="gpt-4o-mini" selected>🟢 GPT-4o-mini</option>
                    <option value="deepseek-chat">🟢 DeepSeek-Chat</option>
                    <option value="llama-3.1-8b">🟢 Llama 3.1 8B</option>
                    <option value="qwen3-coder-480b">🟢 Qwen3 Coder 480B</option>
                    <option value="llama-3.3-70b">🟢 Llama 3.3 70B</option>
                    <option value="llama-3.2-3b">🟡 Llama 3.2 3B</option>
                </select>
                <button onclick="runArena()">⚡ Сгенерировать код</button>
            </div>
            <div class="arena-columns">
                <div class="arena-code" id="code1">Ожидание модели 1...</div>
                <div class="arena-code" id="code2">Ожидание модели 2...</div>
            </div>
            <div id="arenaTiming" style="margin-top:5px; color:#718096;"></div>
            <button onclick="declareWinner()" style="background:#e53e3e;">👑 Определить победителя</button>
            <div id="winnerMsg" class="winner-msg"></div>
            <button onclick="downloadLastResult()" style="background:#718096;">📥 Скачать результат</button>
        </div>
    </div>
</div>

<script>
    let lastArenaResults = [];

    async function checkYear() {
        const y = document.getElementById('yearInput').value;
        const resp = await fetch(`/api/check/${y}`);
        const data = await resp.json();
        const cls = data.is_leap ? 'leap' : 'common';
        document.getElementById('result').innerHTML = `
            <div class="result ${cls}">
                <h3>${data.is_leap ? '✅' : '❌'} ${data.year} — ${data.is_leap ? 'ВИСОКОСНЫЙ' : 'НЕ високосный'}</h3>
                <p>${data.description}</p>
                <p>📅 Дней: <strong>${data.days}</strong> | 🎂 ${data.celebrity || '—'}</p>
                <p class="fact">🔍 /4=${data.rule_check.divisible_by_4}, /100=${data.rule_check.divisible_by_100}, /400=${data.rule_check.divisible_by_400}</p>
            </div>`;
        loadStats();
    }

    function quickCheck(y) {
        document.getElementById('yearInput').value = y;
        checkYear();
    }

    async function loadStats() {
        const resp = await fetch('/api/stats');
        const s = await resp.json();
        document.getElementById('totalChecks').innerText = s.total_checks;
        document.getElementById('leapCount').innerText = s.leap_count;
        document.getElementById('commonCount').innerText = s.common_count;
    }

    async function runArena() {
        // Очищаем старый вердикт перед новой битвой
        document.getElementById('winnerMsg').innerHTML = '';
        const m1 = document.getElementById('model1').value;
        const m2 = document.getElementById('model2').value;
        document.getElementById('code1').innerText = 'Генерирую...';
        document.getElementById('code2').innerText = 'Генерирую...';
        const resp = await fetch('/api/llm-arena/compare', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({models: [m1, m2]})
        });
        const data = await resp.json();
        document.getElementById('arenaTiming').innerText = `⏱️ ${data.elapsed}с`;
        if (data.results && data.results.length >= 2) {
            document.getElementById('code1').innerText = `Модель: ${data.results[0].model}\n\n${data.results[0].content}`;
            document.getElementById('code2').innerText = `Модель: ${data.results[1].model}\n\n${data.results[1].content}`;
            lastArenaResults = data.results;
        }
    }

    async function declareWinner() {
        const resp = await fetch('/api/llm-arena/winner', {method: 'POST'});
        const data = await resp.json();
        let msg = `<p>${data.message}</p>`;
        if (data.evidence) {
            msg += '<ul>';
            data.evidence.forEach(e => {
                msg += `<li><strong>${e.model}</strong>:`;
                if (e.status === 'error') {
                    msg += ` ⚠️ Модель недоступна (ошибка API)`;
                } else if (e.found_rule) {
                    msg += ` ✅ Правило найдено → <code>${e.snippet}</code><br>`;
                    msg += `🧪 Тесты: ${e.num_asserts} assert, покрытие: ${e.coverage_points}/6 (`;
                    if (e.has_1900) msg += '1900 ';
                    if (e.has_2000) msg += '2000 ';
                    if (e.has_2100) msg += '2100 ';
                    if (e.has_negative) msg += 'отрицат. ';
                    if (e.has_typical_leap) msg += 'високос. ';
                    if (e.has_typical_common) msg += 'невисокос. ';
                    msg += ')';
                    if (e.has_assert_messages) msg += ' 🎩 стиль';
                } else {
                    msg += ` ❌ Правило не найдено`;
                }
                msg += '</li>';
            });
            msg += '</ul>';
        }
        document.getElementById('winnerMsg').innerHTML = msg;
    }

    async function downloadLastResult() {
        try {
            const resp = await fetch('/api/llm-arena/last-result');

            if (!resp.ok) {
                alert('Ошибка при скачивании');
                return;
            }

            const blob = await resp.blob(); // ❗ ВАЖНО

            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');

            a.href = url;
            a.download = 'last_result.md';

            document.body.appendChild(a);
            a.click();

            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);

        } catch (e) {
            console.error(e);
            alert('Ошибка при скачивании');
        }
    }

    window.onload = loadStats;
</script>
</body>
</html>
